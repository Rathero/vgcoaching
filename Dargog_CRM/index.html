<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dargog CRM - Sistema de gestión de leads personalizado">
  <title>Dargog CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">◆</span>
        <span class="logo-text">Dargog <span class="logo-accent">CRM</span></span>
      </div>
    </header>
    <main class="app-main">
      <!-- Leads Table View -->
      <div id="leads-view" class="view">
        <div class="view-header">
          <div>
            <h1>Gestión de Leads</h1>
            <p class="view-subtitle" id="leads-count"></p>
          </div>
          <div>
            <button id="btn-create-lead" class="btn btn-primary">
              <span>+</span> Crear nuevo lead
            </button>
          </div>
        </div>
        <div class="table-wrapper">
          <table id="leads-table">
            <thead></thead>
            <tbody></tbody>
          </table>
          <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon">📋</div>
            <h3>No hay leads todavía</h3>
            <p>Crea tu primer lead para empezar a gestionar tus contactos</p>
          </div>
        </div>
      </div>
      <!-- Lead Detail View -->
      <div id="lead-detail-view" class="view" style="display: none;"></div>
    </main>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay">
    <div id="modal-container" class="modal-container"></div>
  </div>

  <!-- Reminder Overlay -->
  <div id="reminder-overlay" class="modal-overlay">
    <div id="reminder-container" class="modal-container modal-lg"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: white;">
    <div style="font-size: 2rem; margin-bottom: 1rem; animation: spin 1s linear infinite;">⏳</div>
    <h3>Conectando con la Base de Datos...</h3>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
